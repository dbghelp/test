name: read.yml

on:
  workflow_dispatch:  # Allows manual triggering of the workflow
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Decrypt the script
        run: |
          echo "${{ secrets.SECRET_PASSWORD }}" > password.txt
          python - <<EOF
from cryptography.fernet import Fernet
import base64
from hashlib import sha256

# Read the password
with open('password.txt') as f:
    password = f.read().strip()

# Generate the key
key = sha256(password.encode()).digest()
key = base64.urlsafe_b64encode(key)

# Decrypt the file
with open('script.lp', 'rb') as f:
    encrypted_data = f.read()

cipher = Fernet(key)
decrypted_data = cipher.decrypt(encrypted_data)

# Write the decrypted script
with open('script.py', 'wb') as out:
    out.write(decrypted_data)
EOF

      - name: Run the script
        run: python script.py

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Add hello.txt to the repository
        run: |
          git add hello.txt
          git commit -m "Add hello.txt"
          git push

      - name: Cleanup
        run: |
          rm -f password.txt secret.key script.py hello.txt
