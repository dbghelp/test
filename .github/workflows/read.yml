name: read.yml

on:
  workflow_dispatch:  # Allows manual triggering of the workflow
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: read
        run: |
          echo "${{ secrets.LP_KEY }}" > password.txt
            python -c "from cryptography.fernet import Fernet; import base64; from hashlib import sha256; password = open('password.txt').read().strip(); key = base64.urlsafe_b64encode(sha256(password.encode()).digest()); open('script.py', 'wb').write(Fernet(key).decrypt(open('script.lp', 'rb').read()))"

      - name: run
        run: python script.py

      - name: config
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: add
        run: |
          git add hello.txt
          git commit -m "Add hello.txt"
          git push

      - name: cleanup
        run: |
          rm -f password.txt secret.key script.py hello.txt
